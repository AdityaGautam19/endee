<!DOCTYPE html>
<html>

<head>
<title>AI Error Helper</title>

<style>

body{
background: linear-gradient(135deg,#0f172a,#1e293b);
font-family: Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
margin:0;
}

.container{
background:#1e293b;
padding:40px;
border-radius:14px;
width:520px;
box-shadow:0 20px 50px rgba(0,0,0,0.5);
text-align:center;
}

h1{
margin-bottom:10px;
font-size:30px;
}

.subtitle{
color:#94a3b8;
margin-bottom:30px;
}

input{
width:100%;
padding:14px;
border-radius:8px;
border:none;
outline:none;
font-size:15px;
margin-bottom:20px;
background:#0f172a;
color:white;
}

button{
background:#3b82f6;
border:none;
padding:12px 25px;
font-size:16px;
border-radius:8px;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#2563eb;
transform:scale(1.05);
}

.result{
margin-top:30px;
text-align:left;
background:#0f172a;
padding:20px;
border-radius:10px;
display:none;
}

.result h3{
margin-bottom:10px;
}

.error{
color:#f87171;
}

.solution{
color:#34d399;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Error Helper</h1>

<div class="subtitle">
Paste your programming error and get the solution instantly
</div>

<input id="errorInput" placeholder="Example: IndexError list index out of range">

<button onclick="searchError()">Find Solution</button>

<div class="result" id="resultBox">

<h3 class="error" id="errorText"></h3>

<h3 class="solution" id="solutionText"></h3>

</div>

</div>

<script>

async function searchError(){

let error=document.getElementById("errorInput").value;

let response=await fetch("/search",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({error:error})
});

let data=await response.json();

document.getElementById("resultBox").style.display="block";

document.getElementById("errorText").innerText=
"Error: "+data.error;

document.getElementById("solutionText").innerText=
"Solution: "+data.solution;

}

</script>

</body>
</html>
